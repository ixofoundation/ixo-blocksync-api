name: Build and Release

permissions:
  contents: write
  packages: write
  security-events: write
  
on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-release:
    uses: ixofoundation/ixo-github-actions/.github/workflows/node-ci-build.yml@main
    with:
      commit_sha: ${{ github.sha }}
      package_manager: 'npm'
    secrets: inherit
